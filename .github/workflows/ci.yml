name: CI

# develop → main PR이 열리거나 업데이트될 때 실행
on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: 타입 검사
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 타입 검사
        run: npx tsc --noEmit
